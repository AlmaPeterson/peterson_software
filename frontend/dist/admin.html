<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Admin · Peterson Software</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand"><span class="brand-mark">⬡</span> Peterson Software</a>
        <nav class="nav-actions" id="nav-actions"></nav>
      </div>
    </header>

    <main class="container" style="padding-bottom: 60px;">
      <div class="page-header" style="padding-bottom: 20px;">
        <h1 class="page-title" style="font-size: 1.6rem;">Admin Panel</h1>
      </div>

      <div class="segmented" style="margin-bottom: 24px;" role="tablist">
        <button class="segmented-item is-active" id="tab-apps" role="tab" aria-selected="true">Releases</button>
        <button class="segmented-item" id="tab-users" role="tab" aria-selected="false">
          Users
          <span id="pending-badge" style="display: none; background: var(--danger); color: #fff; border-radius: 999px; padding: 1px 6px; font-size: 0.7rem; margin-left: 6px;"></span>
        </button>
      </div>

      <section id="panel-apps">
        <div class="card" style="padding: 24px; margin-bottom: 24px;">
          <h2 style="font-weight: 700; font-size: 1.05rem; letter-spacing: -0.01em; margin-bottom: 18px;">Upload New Software</h2>
          <div class="banner banner-danger" id="upload-error" style="display: none;"></div>
          <form id="upload-form" style="display: grid; gap: 14px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 14px;">
              <div>
                <label class="field-label" for="up-name">Name *</label>
                <input id="up-name" name="name" required placeholder="My App" />
              </div>
              <div>
                <label class="field-label" for="up-version">Version *</label>
                <input id="up-version" name="version" required placeholder="1.0.0" />
              </div>
            </div>
            <div>
              <label class="field-label" for="up-visibility">Visibility</label>
              <select id="up-visibility" name="is_public">
                <option value="true">Public</option>
                <option value="false">Private (login required)</option>
              </select>
            </div>
            <div>
              <label class="field-label" for="up-description">Description</label>
              <input id="up-description" name="description" placeholder="Optional short description" />
            </div>
            <div>
              <label class="field-label" for="up-files">Installer Files *</label>
              <input id="up-files" type="file" name="files" multiple required />
              <p style="color: var(--text3); font-size: 0.78rem; margin-top: 6px;">
                Add one file per platform — Android, iOS, Windows, Mac, and Linux installers are detected automatically from the file extension.
              </p>
              <div id="file-preview" style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px;"></div>
            </div>
            <button class="btn btn-primary" type="submit" id="upload-submit">Upload Software</button>
          </form>
        </div>

        <div class="section-title" id="releases-title">Software (0)</div>
        <div class="list-group" id="apps-list"></div>
      </section>

      <section id="panel-users" style="display: none;">
        <div class="section-title" id="users-title">Users (0)</div>
        <div class="list-group" id="users-list"></div>
      </section>
    </main>

    <script type="module" src="js/admin.js"></script>
  </body>
</html>
