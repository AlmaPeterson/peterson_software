<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)" />
    <title>Register · Peterson Software</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand"><span class="brand-mark">⬡</span> Peterson Software</a>
        <nav class="nav-actions" id="nav-actions"></nav>
      </div>
    </header>

    <main class="panel">
      <div class="card" id="form-card" style="padding: 32px;">
        <h1 style="font-weight: 700; font-size: 1.4rem; letter-spacing: -0.01em; margin-bottom: 24px;">Create Account</h1>
        <div class="banner banner-danger" id="error" style="display: none;"></div>
        <form id="register-form" style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <label class="field-label" for="username">Username</label>
            <input id="username" name="username" required autofocus />
          </div>
          <div>
            <label class="field-label" for="email">Email</label>
            <input id="email" type="email" name="email" required />
          </div>
          <div>
            <label class="field-label" for="password">Password</label>
            <input id="password" type="password" name="password" required minlength="6" />
          </div>
          <button class="btn btn-primary" type="submit" id="submit-btn" style="margin-top: 4px;">Create Account</button>
        </form>
        <p style="margin-top: 22px; font-size: 0.88rem; color: var(--text2); text-align: center;">
          Already have an account? <a href="login.html">Sign In</a>
        </p>
      </div>

      <div class="card" id="success-card" style="padding: 32px; text-align: center; display: none;">
        <div style="font-size: 2.5rem; margin-bottom: 14px;">✅</div>
        <h2 style="font-weight: 700; font-size: 1.2rem; letter-spacing: -0.01em; margin-bottom: 8px;">Registration Sent</h2>
        <p style="color: var(--text2); font-size: 0.92rem;">Your account is pending admin approval. You'll be able to log in once approved.</p>
        <a href="login.html" class="btn btn-primary" style="margin-top: 22px;">Back to Sign In</a>
      </div>
    </main>

    <script type="module" src="js/register.js"></script>
  </body>
</html>
