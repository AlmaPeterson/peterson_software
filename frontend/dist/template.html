<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var stored = localStorage.getItem('ps_theme')
        var theme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.dataset.theme = theme
      })()
    </script>
    <meta id="theme-color-meta" name="theme-color" content="#f5f5fb" />
    <title>Peterson Software</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand"><span class="brand-mark">⬡</span> Peterson Software</a>
        <nav class="nav-actions" id="nav-actions"></nav>
      </div>
    </header>

    <main class="container" style="padding-top: 36px; padding-bottom: 60px; max-width: 720px;">
      <p class="skeleton" id="loading">Loading…</p>
      <div id="app-detail" style="display: none;"></div>
      <div id="not-found" class="card" style="display: none; padding: 32px; text-align: center;">
        <p style="color: var(--text2);">This software couldn't be found.</p>
      </div>
      <a href="index.html" class="back-link">← Back to all software</a>
    </main>

    <script type="module" src="js/template.js"></script>
  </body>
</html>
