<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var stored = localStorage.getItem('ps_theme')
        var theme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.dataset.theme = theme
      })()
    </script>
    <meta id="theme-color-meta" name="theme-color" content="#f5f5f7" />
    <title>Sign In · Peterson Software</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand"><span class="brand-mark">⬡</span> Peterson Software</a>
        <nav class="nav-actions" id="nav-actions"></nav>
      </div>
    </header>

    <main class="panel">
      <div class="card" style="padding: 32px;">
        <h1 style="font-weight: 700; font-size: 1.4rem; letter-spacing: -0.01em; margin-bottom: 24px;">Sign In</h1>
        <div class="banner banner-danger" id="error" style="display: none;"></div>
        <form id="login-form" style="display: flex; flex-direction: column; gap: 16px;">
          <div>
            <label class="field-label" for="username">Username</label>
            <input id="username" name="username" required autofocus />
          </div>
          <div>
            <label class="field-label" for="password">Password</label>
            <input id="password" type="password" name="password" required />
          </div>
          <button class="btn btn-primary" type="submit" id="submit-btn" style="margin-top: 4px;">Sign In</button>
        </form>
        <p style="margin-top: 22px; font-size: 0.88rem; color: var(--text2); text-align: center;">
          No account? <a href="register.html">Register</a>
        </p>
      </div>
    </main>

    <script type="module" src="js/login.js"></script>
  </body>
</html>
