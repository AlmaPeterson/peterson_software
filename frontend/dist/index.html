<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        var stored = localStorage.getItem('ps_theme')
        var theme = stored || (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
        document.documentElement.dataset.theme = theme
      })()
    </script>
    <meta id="theme-color-meta" name="theme-color" content="#f5f5fb" />
    <title>Peterson Software</title>
    <link rel="icon" type="image/png" href="favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <a href="index.html" class="brand"><span class="brand-mark">⬡</span> Peterson Software</a>
        <nav class="nav-actions" id="nav-actions"></nav>
      </div>
    </header>

    <main class="container" style="padding-bottom: 60px;">
      <div class="page-header">
        <p class="eyebrow"><span class="eyebrow-mark">⬡</span> Release catalog</p>
        <h1 class="page-title">Software Releases</h1>
        <p class="page-subtitle" id="page-subtitle">Download the latest builds for all platforms.</p>
      </div>

      <div style="margin-bottom: 20px;">
        <div class="segmented" id="filters" role="tablist" aria-label="Filter by platform"></div>
      </div>

      <p class="skeleton" id="loading">Loading releases…</p>
      <div class="app-grid" id="app-grid" style="display: none;"></div>
    </main>

    <script type="module" src="js/home.js"></script>
  </body>
</html>
